<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nešvil - Program svadbe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #fdf6f0;
            min-height: 100vh;
            color: #1a1a1a;
            overflow-x: hidden;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            padding: 25px 20px;
            text-align: center;
        }

        .header {
            margin-bottom: 20px;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: 0.08em;
            margin-bottom: 4px;
        }

        .title span {
            color: #d4af37;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #6b4f2a;
            text-decoration: none;
            margin-bottom: 20px;
        }

        .back-link:hover {
            color: #d4af37;
        }

        .timeline-section {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12);
            background: #fdf6f0;
            text-align: left;
        }

        .timeline-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: #1a1a1a;
            padding: 20px 20px 16px;
            text-align: center;
            border-bottom: 1px solid #e8d9c0;
        }

        .timeline {
            padding: 20px 20px 8px 20px;
            position: relative;
        }

        .tl-card {
            display: flex;
            gap: 14px;
            margin-bottom: 20px;
            position: relative;
        }

        .tl-dot {
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: #1a1a1a;
            white-space: nowrap;
            flex-shrink: 0;
            width: 52px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #d4af37;
            border-radius: 8px;
            padding: 4px 6px;
        }

        .tl-dot.end {
            color: #1a1a1a;
        }

        .tl-body {
            flex: 1;
            background: #f5ebe0;
            border-radius: 10px;
            padding: 12px 14px;
            border: 1px solid #e8d9c0;
        }

        .tl-header {
            margin-bottom: 8px;
        }

        .tl-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #1a1a1a;
        }

        .tl-teams {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .tl-team {
            display: flex;
            gap: 7px;
            align-items: flex-start;
            font-size: 0.78rem;
            line-height: 1.4;
        }

        .tl-badge {
            font-size: 0.68rem;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 4px;
            white-space: nowrap;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .badge-band    { background: #d4af37; color: #1a1a1a; }
        .badge-waiters { background: #f0e8d8; color: #6b4f2a; }
        .badge-photo   { background: #e8dcc8; color: #3d2e1a; }
        .badge-effects { background: #dfd0a0; color: #6b4f2a; }
        .badge-kum     { background: #c8d8c0; color: #2a4a2a; }

        .tl-section {
            margin-bottom: 8px;
        }

        .tl-section summary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
            list-style: none;
            font-family: 'Playfair Display', serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: #b8942a;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 8px 0;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(212,175,55,0.3);
        }

        .tl-section summary::-webkit-details-marker { display: none; }

        .tl-chevron {
            width: 16px;
            height: 16px;
            color: #d4af37;
            flex-shrink: 0;
            transition: transform 0.2s ease;
        }

        .tl-section[open] .tl-chevron {
            transform: rotate(90deg);
        }

        .tl-section-content {
            overflow: hidden;
        }

        .tl-date-label {
            font-family: 'Playfair Display', serif;
            font-size: 0.75rem;
            font-weight: 600;
            color: #b8942a;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 4px 0 8px 0;
            margin-top: 4px;
            border-bottom: 1px dashed rgba(212,175,55,0.25);
            margin-bottom: 14px;
        }

        .tl-date-label:first-child {
            margin-top: 0;
        }

        .tl-note {
            font-size: 0.72rem;
            color: #999;
            font-style: italic;
            margin: 4px 0 16px 0;
            padding: 8px 12px;
            background: #f0e8e0;
            border-radius: 8px;
            border-left: 3px solid #d4c4a8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">🕐 Program svadbe</h1>
        </header>

        <a href="index.html" class="back-link">
            ← Nazad na glavnu stranu
        </a>

        <div id="role-filter" style="
            display: flex;
            width: 100%;
            margin-bottom: 16px;
            border: 1px solid #e8d9c0;
            border-radius: 8px;
            overflow: hidden;
            background: #f5ebe0;
        ">
            <button data-value="all"     class="seg-btn seg-active">Svi</button>
            <button data-value="band"    class="seg-btn">Bend</button>
            <button data-value="waiters" class="seg-btn">Konobari</button>
            <button data-value="photo"   class="seg-btn">Foto</button>
            <button data-value="effects" class="seg-btn">Efekti</button>
            <button data-value="kum"     class="seg-btn">Ostalo</button>
        </div>
        <style>
            .seg-btn {
                flex: 1;
                padding: 8px 4px;
                font-family: 'Montserrat', sans-serif;
                font-size: 0.72rem;
                font-weight: 500;
                color: #6b4f2a;
                background: transparent;
                border: none;
                border-right: 1px solid #e8d9c0;
                cursor: pointer;
                transition: background 0.15s, color 0.15s;
            }
            .seg-btn:last-child { border-right: none; }
            .seg-btn.seg-active {
                background: #c0b8b0;
                color: #1a1a1a;
                font-weight: 600;
            }
        </style>

        <div class="timeline-section">
            <div class="timeline">

                <details class="tl-section">
                    <summary>
                        <svg class="tl-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                        Pre venčanja (29.)
                    </summary>
                    <div class="tl-section-content">
                        <div id="tl-events-0"></div>
                    </div>
                </details>

                <details class="tl-section" open>
                    <summary>
                        <svg class="tl-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                        Dan svadbe — 31. maj
                    </summary>
                    <div class="tl-section-content">
                        <div id="tl-events-1"></div>
                    </div>
                </details>

            </div>
        </div>
    </div>
    <script src="data/program-data.js"></script>
    <script>
        const BADGE_LABELS = {
            band:    'Bend',
            waiters: 'Konobari',
            photo:   'Foto/Video',
            effects: 'Efekti',
            kum:     'Ostalo',
        };

        function renderTeam(t, subtime) {
            const timeSpan = subtime
                ? `<span style="color:#1a1a1a;font-size:0.78rem;font-weight:600;margin-right:4px;white-space:nowrap;">${subtime}</span>`
                : '';
            return `<div class="tl-team">${timeSpan}<span class="tl-badge badge-${t.badge}">${BADGE_LABELS[t.badge]}</span><span class="tl-team-text">${t.text}</span></div>`;
        }

        function renderEvent(ev) {
            if (ev.dateLabel) return `<div class="tl-date-label">${ev.dateLabel}</div>`;

            let bodyHTML = ev.title ? `<div class="tl-header"><span class="tl-title">${ev.title}</span></div>` : '';

            if (ev.groups) {
                ev.groups.forEach((g, i) => {
                    if (i > 0) bodyHTML += '<div data-divider style="border-top:1px solid #e8d9c0;margin:8px 0;"></div>';
                    bodyHTML += '<div class="tl-teams">';
                    g.teams.forEach((t, ti) => { bodyHTML += renderTeam(t, ti === 0 ? g.subtime : null); });
                    bodyHTML += '</div>';
                });
            } else {
                bodyHTML += '<div class="tl-teams">' + ev.teams.map(t => renderTeam(t, null)).join('') + '</div>';
            }

            const dotClass = ev.end ? 'tl-dot end' : 'tl-dot';
            return `<div class="tl-card"><div class="${dotClass}">${ev.time}</div><div class="tl-body">${bodyHTML}</div></div>`;
        }

        function renderTimeline() {
            programData.forEach((section, i) => {
                const el = document.getElementById(`tl-events-${i}`);
                if (el) el.innerHTML = section.events.map(renderEvent).join('');
            });
        }

        function applyFilter(value) {
            document.querySelectorAll('.tl-team').forEach(team => {
                team.style.display = (!value || value === 'all' || team.querySelector(`.badge-${value}`)) ? '' : 'none';
            });
            document.querySelectorAll('.tl-body').forEach(body => {
                const divider = body.querySelector('[data-divider]');
                if (!divider) return;
                const above = divider.previousElementSibling;
                if (!above) return;
                const anyVisible = [...above.querySelectorAll('.tl-team')].some(t => t.style.display !== 'none');
                divider.style.display = anyVisible ? '' : 'none';
            });
            document.querySelectorAll('.tl-card').forEach(card => {
                const anyVisible = [...card.querySelectorAll('.tl-team')].some(t => t.style.display !== 'none');
                card.style.display = anyVisible ? '' : 'none';
            });
        }

        function animateClose(details) {
            const content = details.querySelector('.tl-section-content');
            const start = content.scrollHeight;
            content.style.height = start + 'px';
            requestAnimationFrame(() => {
                content.style.transition = 'height 0.3s ease';
                content.style.height = '0px';
                content.addEventListener('transitionend', () => {
                    details.open = false;
                    content.style.height = '';
                    content.style.transition = '';
                }, { once: true });
            });
        }

        function animateOpen(details) {
            details.open = true;
            const content = details.querySelector('.tl-section-content');
            const end = content.scrollHeight;
            content.style.height = '0px';
            content.style.overflow = 'hidden';
            requestAnimationFrame(() => {
                content.style.transition = 'height 0.3s ease';
                content.style.height = end + 'px';
                content.addEventListener('transitionend', () => {
                    content.style.height = '';
                    content.style.transition = '';
                    content.style.overflow = '';
                }, { once: true });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTimeline();

            document.querySelectorAll('.tl-section').forEach(details => {
                details.addEventListener('click', e => {
                    if (!e.target.closest('summary')) return;
                    e.preventDefault();
                    if (details.open) {
                        animateClose(details);
                    } else {
                        animateOpen(details);
                    }
                });
            });

            document.querySelectorAll('.seg-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('seg-active'));
                    btn.classList.add('seg-active');
                    applyFilter(btn.dataset.value);
                });
            });
        });
    </script>
</body>
</html>
