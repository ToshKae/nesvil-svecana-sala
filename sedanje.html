<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nešvil - Raspored sedanja</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #fdf6f0;
            min-height: 100vh;
            color: #1a1a1a;
            overflow-x: hidden;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 25px 20px;
            text-align: center;
        }

        .header {
            margin-bottom: 20px;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: 0.08em;
            margin-bottom: 4px;
        }

        .title span {
            color: #d4af37;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #6b4f2a;
            text-decoration: none;
            margin-bottom: 20px;
        }

        .back-link:hover {
            color: #d4af37;
        }

        .search-wrap {
            position: relative;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            border: 2px solid #d4af37;
            border-radius: 8px;
            background: #fdf6f0;
            color: #1a1a1a;
            outline: none;
        }

        .search-input::placeholder {
            color: #bbb;
        }

        .search-input:focus {
            border-color: #b8932a;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.15);
        }

        .search-result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #e8d9c0;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .search-result-item:hover {
            background: #f5ebe0;
        }

        .search-result-name {
            font-size: 0.9rem;
            color: #1a1a1a;
        }

        .search-result-sto {
            font-size: 0.78rem;
            font-weight: 600;
            color: #d4af37;
            background: #fdf6f0;
            border: 1px solid #d4af37;
            border-radius: 5px;
            padding: 2px 8px;
        }

        .search-no-result {
            padding: 12px 16px;
            font-size: 0.85rem;
            color: #999;
            text-align: center;
        }

        .seating-section {
            width: 100%;
            border: 3px solid #d4af37;
            border-radius: 12px;
            overflow-y: auto;
            max-height: 416px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12);
            background: #fdf6f0;
            text-align: left;
        }

        .seating-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: #1a1a1a;
            padding: 20px 20px 16px;
            text-align: center;
            border-bottom: 1px solid #e8d9c0;
        }

        .seating-group {
            border-bottom: 1px solid #e8d9c0;
        }

        .seating-group:last-child {
            border-bottom: none;
        }

        .seating-group summary {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            cursor: pointer;
            user-select: none;
            list-style: none;
            background: #fdf6f0;
            transition: background 0.2s ease;
        }

        .seating-group summary::-webkit-details-marker { display: none; }

        .seating-group summary:hover {
            background: #f5ebe0;
        }

        .seating-chevron {
            width: 18px;
            height: 18px;
            color: #d4af37;
            flex-shrink: 0;
            transition: transform 0.2s ease;
        }

        .seating-group[open] .seating-chevron {
            transform: rotate(90deg);
        }

        .seating-letter {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 600;
            color: #d4af37;
            min-width: 24px;
        }

        .seating-group-title {
            font-size: 0.85rem;
            font-weight: 500;
            color: #1a1a1a;
            flex: 1;
        }

        .seating-count {
            font-size: 0.75rem;
            color: #999;
        }

        .seating-names {
            list-style: none;
            padding: 0 20px 12px 54px;
            background: #f8f0e6;
        }

        .seating-names li {
            padding: 7px 0;
            font-size: 0.85rem;
            color: #333;
            border-bottom: 1px solid #ecdfc8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .seating-table-num {
            font-size: 0.75rem;
            font-weight: 600;
            color: #d4af37;
            background: #fdf6f0;
            border: 1px solid #d4af37;
            border-radius: 5px;
            padding: 2px 7px;
            flex-shrink: 0;
        }

        .seating-names li:last-child {
            border-bottom: none;
        }
    </style>
</head>

    <script src="sedanje-data.js"></script>
    <script>
        const collator = new Intl.Collator('sr', { sensitivity: 'base' });
        const sorted = [...gosti].sort((a, b) => collator.compare(a.ime, b.ime));

        const groups = {};
        sorted.forEach(g => {
            const slovo = g.ime[0].toUpperCase();
            if (!groups[slovo]) groups[slovo] = [];
            groups[slovo].push(g);
        });

        const root = document.getElementById('seating-root');
        let prvi = true;

        Object.keys(groups).sort((a, b) => collator.compare(a, b)).forEach(slovo => {
            const lista = groups[slovo];
            const prvi_ime = lista[0].ime.split(' ')[0];
            const zadnji_ime = lista[lista.length - 1].ime.split(' ')[0];
            const naslov = lista.length === 1 ? lista[0].ime.split(' ')[0] : `${prvi_ime} – ${zadnji_ime}`;
            const brGostiju = lista.length === 1 ? '1 gost' : `${lista.length} gosta`;

            const details = document.createElement('details');
            details.className = 'seating-group';
            if (prvi) { details.open = true; prvi = false; }

            details.innerHTML = `
                <summary>
                    <svg class="seating-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                    <span class="seating-letter">${slovo}</span>
                    <span class="seating-group-title">${naslov}</span>
                    <span class="seating-count">${brGostiju}</span>
                </summary>
                <ul class="seating-names">
                    ${lista.map(g => `
                    <li style="cursor: pointer;" data-sto="${g.sto}">
                        <span>${g.ime}</span>
                        <span class="seating-table-num">Sto broj ${g.sto}</span>
                    </li>`).join('')}
                </ul>`;

            root.appendChild(details);
        });

        function animateClose(details) {
            const content = details.querySelector('ul');
            const start = content.scrollHeight;
            content.style.height = start + 'px';
            requestAnimationFrame(() => {
                content.style.transition = 'height 0.3s ease';
                content.style.height = '0px';
                content.addEventListener('transitionend', () => {
                    details.open = false;
                    content.style.height = '';
                    content.style.transition = '';
                }, { once: true });
            });
        }

        function animateOpen(details) {
            details.open = true;
            const content = details.querySelector('ul');
            const end = content.scrollHeight;
            content.style.height = '0px';
            content.style.overflow = 'hidden';
            requestAnimationFrame(() => {
                content.style.transition = 'height 0.3s ease';
                content.style.height = end + 'px';
                content.addEventListener('transitionend', () => {
                    content.style.height = '';
                    content.style.transition = '';
                    content.style.overflow = '';
                }, { once: true });
            });
        }

        // Dodaj data-table atribute na krugove
        const circles = document.querySelectorAll('[style*="border-radius: 50%"]');
        circles.forEach(c => c.setAttribute('data-table', c.textContent.trim()));

let activeTable = null;

        function highlightTable(sto) {
            circles.forEach(c => {
                c.style.background = '#fdf6f0';
                c.style.color = '#d4af37';
            });
            if (activeTable === sto) {
                activeTable = null;
                return;
            }
            activeTable = sto;
            const target = document.querySelector(`[data-table="${sto}"]`);
            if (target) {
                target.style.background = '#d4af37';
                target.style.color = '#1a1a1a';
            }
        }

        // Search
        function normalize(s) {
            return s.toLowerCase().replace(/đ/g, 'd').normalize('NFD').replace(/[̀-ͯ]/g, '');
        }

        const searchInput = document.getElementById('search-input');
        const accordionHTML = root.innerHTML;

        function showAccordion() {
            root.innerHTML = accordionHTML;
        }

        function showSearchResults(q) {
            const matches = gosti.filter(g => normalize(g.ime).includes(normalize(q))).slice(0, 10);
            root.innerHTML = '';
            if (matches.length === 0) {
                root.innerHTML = '<div class="search-no-result">Niko nije pronađen</div>';
                return;
            }
            matches.forEach(g => {
                const div = document.createElement('div');
                div.className = 'search-result-item';
                div.innerHTML = `<span class="search-result-name">${g.ime}</span><span class="search-result-sto">Sto broj ${g.sto}</span>`;
                div.addEventListener('click', () => {
                    highlightTable(g.sto);
                    searchInput.value = g.ime;
                    showAccordion();
                    document.querySelector(`[data-table="${g.sto}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                });
                root.appendChild(div);
            });
        }

        searchInput.addEventListener('input', () => {
            const q = searchInput.value.trim().toLowerCase();
            if (q.length < 1) { showAccordion(); return; }
            showSearchResults(q);
        });

        root.addEventListener('click', e => {
            const li = e.target.closest('li[data-sto]');
            if (li) {
                highlightTable(parseInt(li.dataset.sto));
                return;
            }
            const details = e.target.closest('details');
            if (!details) return;
            e.preventDefault();
            if (details.open) {
                animateClose(details);
            } else {
                root.querySelectorAll('details').forEach(other => {
                    if (other !== details && other.open) animateClose(other);
                });
                animateOpen(details);
            }
        });
    </script>
